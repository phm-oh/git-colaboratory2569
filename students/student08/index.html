<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* Matrix rain canvas */
    #matrix { position: fixed; inset: 0; z-index: 0; opacity: 0.18; }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 400px;
      background: rgba(0, 8, 0, 0.92);
      border: 1px solid #00ff41;
      border-radius: 4px;
      padding: 0;
      box-shadow: 0 0 40px rgba(0,255,65,0.15), inset 0 0 60px rgba(0,255,65,0.03);
      animation: bootUp 0.5s ease forwards;
    }

    @keyframes bootUp {
      from { opacity: 0; transform: scaleY(0.02); filter: brightness(3); }
      to   { opacity: 1; transform: scaleY(1); filter: brightness(1); }
    }

    /* Terminal title bar */
    .terminal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid #00ff4133;
      background: rgba(0,255,65,0.05);
    }

    .terminal-bar .dots { display: flex; gap: 6px; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #00ff41;
      opacity: 0.4;
    }
    .dot:first-child { opacity: 0.9; }

    .terminal-bar .title {
      font-size: 0.7rem;
      color: #00ff4199;
      letter-spacing: 0.15em;
    }

    /* Avatar area */
    .avatar-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 2rem 1rem;
    }

    .avatar-ring {
      position: relative;
      width: 300px;
      height: 300px;
      cursor: pointer;
    }

    .avatar-ring::before, .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid #00ff41;
      animation: spin 6s linear infinite;
    }

    .avatar-ring::after {
      inset: -10px;
      border-color: #00ff4133;
      animation-direction: reverse;
      animation-duration: 10s;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #00ff41;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .avatar-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-initial {
      font-family: 'VT323', monospace;
      font-size: 3rem;
      color: #00ff41;
      text-shadow: 0 0 20px #00ff41;
    }

    #file-input { display: none; }

    /* Info */
    .info { text-align: center; padding: 1rem 2rem; }

    .prompt {
      font-size: 0.7rem;
      color: #00ff4166;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    .name {
      font-family: 'VT323', monospace;
      font-size: 2.6rem;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff41, 0 0 30px #00ff4166;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 1.8rem;
      background: #00ff41;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .role {
      font-size: 0.75rem;
      color: #00ff4199;
      letter-spacing: 0.2em;
      margin-top: 6px;
    }

    /* Stats bar */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid #00ff4122;
      border-bottom: 1px solid #00ff4122;
      margin: 1rem 0;
    }

    .stat {
      padding: 12px 8px;
      text-align: center;
      border-right: 1px solid #00ff4122;
    }

    .stat:last-child { border-right: none; }

    .stat-val {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      color: #00ff41;
      text-shadow: 0 0 8px #00ff41;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.6rem;
      color: #00ff4155;
      letter-spacing: 0.15em;
      margin-top: 3px;
    }

    /* Bio */
    .bio-block { padding: 0 2rem 1rem; }

    .bio-line {
      font-size: 0.8rem;
      color: #00cc33;
      line-height: 1.8;
      opacity: 0;
    }

    .bio-line.typed { opacity: 1; }

    /* Skills */
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 2rem 1.5rem;
    }

    .skill {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border: 1px solid #00ff4144;
      color: #00ff4199;
      border-radius: 2px;
      transition: all 0.2s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .skill::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #00ff41;
      transform: translateX(-100%);
      transition: transform 0.2s;
      z-index: -1;
    }

    .skill:hover::before { transform: translateX(0); }
    .skill:hover { color: #000; border-color: #00ff41; }

    /* Actions */
    .actions {
      display: flex;
      gap: 0;
      border-top: 1px solid #00ff4122;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      border-right: 1px solid #00ff4122;
      color: #00ff4199;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .action-btn:last-child { border-right: none; }
    .action-btn:hover { background: rgba(0,255,65,0.08); color: #00ff41; }
    .action-btn:active { background: rgba(0,255,65,0.15); }

    /* Edit modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .edit-box {
      background: #000;
      border: 1px solid #00ff41;
      box-shadow: 0 0 30px rgba(0,255,65,0.2);
      border-radius: 4px;
      padding: 1.5rem;
      width: 340px;
      font-family: 'Share Tech Mono', monospace;
    }

    .edit-box h2 {
      font-family: 'VT323', monospace;
      font-size: 1.4rem;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff41;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 0.65rem;
      color: #00ff4166;
      letter-spacing: 0.18em;
      margin-bottom: 5px;
    }

    .field input, .field textarea {
      width: 100%;
      background: #000;
      border: 1px solid #00ff4144;
      color: #00ff41;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 8px 10px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus, .field textarea:focus {
      border-color: #00ff41;
      box-shadow: 0 0 8px rgba(0,255,65,0.2);
    }

    .field textarea { height: 70px; resize: none; }

    .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }

    .btn { padding: 8px 18px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .btn-cancel { background: transparent; border: 1px solid #00ff4133; color: #00ff4166; }
    .btn-cancel:hover { border-color: #00ff41; color: #00ff41; }
    .btn-save { background: #00ff41; border: 1px solid #00ff41; color: #000; }
    .btn-save:hover { box-shadow: 0 0 15px rgba(0,255,65,0.5); }

    /* Glitch on name hover */
    .name:hover { animation: glitch 0.3s steps(2) infinite; }

    @keyframes glitch {
      0%   { text-shadow: -2px 0 #ff0066, 2px 0 #00f0ff, 0 0 10px #00ff41; }
      25%  { text-shadow: 2px 0 #ff0066, -2px 0 #00f0ff, 0 0 10px #00ff41; }
      50%  { text-shadow: -1px 0 #ff0066, 1px 0 #00f0ff, 0 0 10px #00ff41; clip-path: inset(40% 0 30% 0); }
      75%  { text-shadow: 1px 0 #ff0066, -1px 0 #00f0ff, 0 0 10px #00ff41; }
      100% { text-shadow: 0 0 10px #00ff41; }
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="card">
  <div class="terminal-bar">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="title">root@localhost ~ profile.sh</div>
    <div style="font-size:0.65rem;color:#00ff4155;">▲ ▼</div>
  </div>

  <div class="avatar-area">
    <div class="avatar-ring">
      <div class="avatar-inner">
        <img id="avatarImg" src="./image/siwa.jpg" alt="profile" onerror="this.style.display='none';document.getElementById('avatarInitial').style.display='flex'"/>
        <span class="avatar-initial" id="avatarInitial" style="display:none">S</span>
      </div>
    </div>
  </div>

  <div class="info">
    <div class="prompt">// user identified</div>
    <div class="name" id="nameEl">SIWAT<span class="cursor"></span></div>
    <div class="role" id="roleEl">STUDENT &nbsp;/&nbsp; DEVELOPER</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s1">08</div><div class="stat-label">STUDENT ID</div></div>
    <div class="stat"><div class="stat-val" id="s2">∞</div><div class="stat-label">COMMITS</div></div>
    <div class="stat"><div class="stat-val" id="s3">100%</div><div class="stat-label">UPTIME</div></div>
  </div>

  <div class="bio-block" id="bioBlock">
    <div class="bio-line" id="bioEl">&gt; IHN i hate n g .</div>
    <div class="bio-line" id="bioEl2">&gt; ชอบ... .</div>
  </div>

  <div class="skills" id="skillsEl">
    <span class="skill">ไม่บอก</span>
    <span class="skill">ถามครูโอ้</span>
    <span class="skill">บาสเกย์</span>
    <span class="skill">ทำเพื่อนเป็นเกย์ได้</span>
    <span class="skill">ไม่มี</span>
  </div>

  <div class="actions">
    <button class="action-btn" onclick="openEdit()">[EDIT]</button>
    <button class="action-btn" onclick="copyCard()">[COPY]</button>
    <button class="action-btn" onclick="pingEffect()">[PING]</button>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="overlay" onclick="backdropClose(event)">
  <div class="edit-box">
    <h2>&gt; EDIT_PROFILE.SH</h2>
    <div class="field"><label>NAME</label><input id="inp-name" value="SIWAT"/></div>
    <div class="field"><label>ROLE</label><input id="inp-role" value="STUDENT / DEVELOPER"/></div>
    <div class="field"><label>BIO LINE 1</label><input id="inp-bio1" value="Curious mind exploring code and creativity."/></div>
    <div class="field"><label>BIO LINE 2</label><input id="inp-bio2" value="Building things that matter, one line at a time."/></div>
    <div class="field"><label>SKILLS (comma-separated)</label><textarea id="inp-skills">Python, Web Dev, Git, Linux, Hacking</textarea></div>
    <div class="edit-actions">
      <button class="btn btn-cancel" onclick="closeEdit()">CANCEL</button>
      <button class="btn btn-save" onclick="saveEdit()">EXECUTE</button>
    </div>
  </div>
</div>

<script>
  // Matrix rain
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 16);
  const drops = Array(cols).fill(1);
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+-=[]{}|;:,./<>?';

  function drawMatrix() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px Share Tech Mono';
    drops.forEach((y, i) => {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 16, y * 16);
      if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }
  setInterval(drawMatrix, 50);

  // Typewriter bio
  setTimeout(() => {
    document.querySelectorAll('.bio-line').forEach((el, i) => {
      setTimeout(() => el.classList.add('typed'), i * 400);
    });
  }, 600);



  // Edit modal
  function openEdit() { document.getElementById('overlay').classList.add('open'); }
  function closeEdit() { document.getElementById('overlay').classList.remove('open'); }
  function backdropClose(e) { if (e.target === document.getElementById('overlay')) closeEdit(); }

  function saveEdit() {
    const name = document.getElementById('inp-name').value.trim().toUpperCase();
    const role = document.getElementById('inp-role').value.trim().toUpperCase();
    const bio1 = document.getElementById('inp-bio1').value.trim();
    const bio2 = document.getElementById('inp-bio2').value.trim();
    const skills = document.getElementById('inp-skills').value.split(',').map(s => s.trim()).filter(Boolean);

    document.getElementById('nameEl').innerHTML = name + '<span class="cursor"></span>';
    document.getElementById('roleEl').textContent = role;
    document.getElementById('bioEl').textContent = '> ' + bio1;
    document.getElementById('bioEl2').textContent = '> ' + bio2;

    const skillsEl = document.getElementById('skillsEl');
    skillsEl.innerHTML = skills.map(s => `<span class="skill">${s}</span>`).join('');
    closeEdit();
  }

  // Copy
  function copyCard() {
    const name = document.getElementById('nameEl').innerText.replace('|','');
    const role = document.getElementById('roleEl').textContent;
    const bio1 = document.getElementById('bioEl').textContent;
    const bio2 = document.getElementById('bioEl2').textContent;
    navigator.clipboard.writeText(`${name}\n${role}\n${bio1}\n${bio2}`).then(() => {
      const btn = document.querySelector('.actions .action-btn:nth-child(2)');
      btn.textContent = '[COPIED!]';
      setTimeout(() => btn.textContent = '[COPY]', 1800);
    });
  }

  // Ping glitch effect
  function pingEffect() {
    const card = document.querySelector('.card');
    card.style.animation = 'none';
    card.style.boxShadow = '0 0 80px rgba(0,255,65,0.6), inset 0 0 40px rgba(0,255,65,0.1)';
    setTimeout(() => card.style.boxShadow = '0 0 40px rgba(0,255,65,0.15), inset 0 0 60px rgba(0,255,65,0.03)', 400);
    const btn = document.querySelector('.actions .action-btn:nth-child(3)');
    btn.textContent = '[PONG!]';
    setTimeout(() => btn.textContent = '[PING]', 1500);
  }
</script>
</body>
</html>
