<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f3f4f6;
    }

    .card {
      width: 600px;
      height: 650px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .card img {
      width: 450px;
      height: 450px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 4px solid #4f46e5;
    }

    .card h2 {
      margin-bottom: 8px;
      color: #111827;
    }

    .card p {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .socials a {
      text-decoration: none;
      color: white;
      background: #4f46e5;
      padding: 10px 16px;
      border-radius: 10px;
      margin: 0 5px;
      display: inline-block;
      transition: 0.3s;
    }

    .socials a:hover {
      background: #3730a3;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="/images/IMG_20260520_162526.jpg" alt="Profile">

    <h2>กากเจียว</h2>
    <p>Frontend Developer</p>

    <div class="socials">
      <a href="#">ยกล้อ</a>
      <a href="#">ครูสอน: ครูโอ้สุดหล่อ</a>
    </div>
  </div>

</body>
</html>
