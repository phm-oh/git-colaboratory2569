<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โปรไฟล์สายแต่งรถ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <div class="profile-photo">
      <img src="./image/dum.png" alt="รูปโปรไฟล์" />
    </div>
    <div class="content">
      <h2>นายณัฐกรณ์ อุเทนหลอย</h2>
      
      <div class="details">
        <p class="detail"><span>รายวิชา:</span> หมอบยังไงไม่ให้โดนลม</p>
        <p class="detail"><span>ครูผู้สอน:</span> ครูโอ้ Mazda Cx5 โหลดเตี้ยซิ่งๆ</p>
      </div>
      <p class="caption">แว้น ยกล้อ หมอบ ท่อดัง แต่งรถ จัดหนักทุกทางโค้ง</p>
      <div class="stats">
        <div class="stat">
          <span>ยกล้อ</span>  
          <div class="bar">
            <div class="fill" style="width: 92%"></div>
          </div>
          <span class="percent">92%</span>
        </div>
        <div class="stat">
          <span>แว้น</span>
          <div class="bar">
            <div class="fill" style="width: 85%"></div>
          </div>
          <span class="percent">85%</span>
        </div>
        <div class="stat">
          <span>ท่อดัง</span>
          <div class="bar">
            <div class="fill" style="width: 100%"></div>
          </div>
          <span class="percent">100%</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
