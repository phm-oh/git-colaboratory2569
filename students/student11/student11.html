<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonwipha | Galaxy Cat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at 20% 20%,#00d9ff22,transparent 40%),
    radial-gradient(circle at 80% 80%,#7c4dff22,transparent 40%),
    radial-gradient(circle at 50% 50%,#0f172a,#020617);
}

/* 🌌 Stars */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(white 1px,transparent 1px);
    background-size:60px 60px;
    opacity:.25;
    animation:moveStars 80s linear infinite;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(600px);}
}

/* ✨ Glow */
.blob{
    position:absolute;
    width:400px;
    height:400px;
    filter:blur(120px);
    border-radius:50%;
    opacity:.4;
}

.blob1{
    background:#00d9ff;
    top:-120px;
    left:-120px;
    animation:float 10s ease-in-out infinite;
}

.blob2{
    background:#7c4dff;
    bottom:-120px;
    right:-120px;
    animation:float 12s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(50px);
    }
}

/* 💎 CARD */
.card{
    width:900px;
    max-width:95%;
    padding:20px;
    border-radius:40px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 60px rgba(0,0,0,.5),
    0 0 100px rgba(0,217,255,.15);

    position:relative;
    z-index:10;
    transition:.4s ease;
}

.card:hover{
    transform:scale(1.01);
}

.card::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:40px;
    padding:2px;

    background:linear-gradient(
        120deg,
        #00d9ff,
        #7c4dff,
        #ffffff,
        #00d9ff
    );

    background-size:300%;
    animation:borderMove 8s linear infinite;

    -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);

    -webkit-mask-composite:xor;
    mask-composite:exclude;

    pointer-events:none;
}

@keyframes borderMove{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

/* 🌆 Banner */
.banner{
    height:340px;
    border-radius:30px;
    overflow:hidden;
    position:relative;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:1.2s ease;
}

.banner:hover img{
    transform:scale(1.08);
}

.banner::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

/* 👤 Profile */
.profile{
    text-align:center;
    margin-top:-120px;
    position:relative;
}

.profile-img{
    width:250px;
    height:250px;
    border-radius:50%;
    object-fit:cover;

    border:6px solid rgba(255,255,255,.2);

    box-shadow:
    0 0 40px #00d9ff,
    0 0 120px #7c4dff;

    animation:floatAvatar 6s ease-in-out infinite;
}

@keyframes floatAvatar{
    50%{
        transform:translateY(-10px);
    }
}

/* ✨ Name */
h1{
    font-size:42px;
    margin-top:15px;

    background:linear-gradient(
        90deg,
        #00d9ff,
        #ffffff,
        #ffb6d9,
        #7c4dff,
        #00d9ff
    );

    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shine 6s linear infinite;
}

@keyframes shine{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

/* 📦 Info */
.info{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.desc{
    padding:18px;
    border-radius:20px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);

    color:#d9eeff;
    transition:.4s ease;
}

.desc:hover{
    transform:translateY(-6px);
    box-shadow:0 0 30px rgba(0,217,255,.25);
}

/* 🐱 Cat Social */
.cat-social{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.cat-card{
    min-width:260px;
    padding:18px 25px;

    display:flex;
    align-items:center;
    gap:15px;

    border-radius:25px;

    background:rgba(255,255,255,.07);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    position:relative;
    overflow:hidden;

    transition:.4s ease;
}

.cat-card:hover{
    transform:translateY(-8px);
    box-shadow:
    0 0 30px rgba(255,182,193,.35),
    0 0 60px rgba(255,255,255,.08);
}

.cat-card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.15),
        transparent
    );

    transform:translateX(-120%);
    transition:1s;
}

.cat-card:hover::before{
    transform:translateX(120%);
}

.cat-card::after{
    content:'🐾';
    position:absolute;
    right:15px;
    top:10px;
    font-size:28px;
    opacity:.15;
}

.cat-icon{
    font-size:40px;
    filter:drop-shadow(0 0 12px #ffd6e7);
}

.cat-card small{
    display:block;
    color:#ffd6e7;
    letter-spacing:2px;
    text-transform:uppercase;
}

.cat-card h3{
    color:white;
    margin-top:3px;
    font-size:18px;
    font-weight:600;
}

.ig{
    border-color:rgba(255,150,210,.4);
}

.fb{
    border-color:rgba(150,220,255,.4);
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">

    <div class="banner">
        <img src="https://img.magnific.com/free-photo/anime-style-galaxy-background_23-2151134289.jpg?w=360">
    </div>

    <div class="profile">

        <img class="profile-img" src="./image/S__47169544.jpg">

        <h1>🐱 Phonwipha Thothuang 🌸</h1>

        <div class="info">

            <div class="desc">✨ INTJ</div>
            <div class="desc">🌙 Introvert energy</div>
            <div class="desc">🍜 Noodles & Mala lover</div>

        </div>

        <div class="cat-social">

            <div class="cat-card ig">
                <span class="cat-icon">🐱</span>
                <div>
                    <small>Instagram</small>
                    <h3>@jx_.n4</h3>
                </div>
            </div>

            <div class="cat-card fb">
                <span class="cat-icon">🌸</span>
                <div>
                    <small>Facebook</small>
                    <h3>Phonwipha Thothuang</h3>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
